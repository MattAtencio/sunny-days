<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Sky background -->
  <rect width="100" height="100" rx="20" fill="#87CEEB"/>

  <!-- Sun -->
  <circle cx="50" cy="35" r="18" fill="#FCD34D"/>

  <!-- Sun rays -->
  <line x1="50" y1="10" x2="50" y2="15" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="55" x2="50" y2="60" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="35" x2="30" y2="35" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="35" x2="75" y2="35" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="33" y1="18" x2="36" y2="21" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="49" x2="67" y2="52" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="67" y1="18" x2="64" y2="21" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="49" x2="33" y2="52" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>

  <!-- Cloud mascot -->
  <ellipse cx="50" cy="72" rx="28" ry="12" fill="white"/>
  <ellipse cx="38" cy="65" rx="15" ry="13" fill="white"/>
  <ellipse cx="58" cy="64" rx="13" ry="12" fill="white"/>
  <ellipse cx="48" cy="60" rx="12" ry="11" fill="white"/>

  <!-- Eyes -->
  <circle cx="42" cy="68" r="3" fill="#1F2937"/>
  <circle cx="56" cy="68" r="3" fill="#1F2937"/>
  <circle cx="43" cy="67" r="1" fill="white"/>
  <circle cx="57" cy="67" r="1" fill="white"/>

  <!-- Smile -->
  <path d="M44 74 Q50 79 56 74" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
